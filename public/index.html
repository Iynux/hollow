<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hollow</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #0b0b0f;
        color: #f5f5f5;
      }
      .card {
        max-width: 520px;
        padding: 32px;
        border: 1px solid #2a2a33;
        border-radius: 16px;
        background: #12121a;
      }
      code {
        display: block;
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        background: #1a1a24;
        white-space: pre-wrap;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hollow</h1>
      <p>Auth API is online. Use the Discord panel loader — do not share your login.</p>
      <code>loadstring(game:HttpGet("https://hypnosis-coral.vercel.app/loader.lua"))()</code>
    </div>
  </body>
</html>
